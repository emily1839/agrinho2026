<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro Forte Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Agro Forte: Futuro Sustentável</h1>
        <p>Equilíbrio entre produção e meio ambiente</p>
    </header>

    <main>
        <section class="section" id="controle-plantacao">
            <h2>Controle de Plantação</h2>

            <input type="text" id="nome-planta" placeholder="Nome da Planta">
            <input type="number" id="quantidade" placeholder="Quantidade">
            <input type="number" id="agua" placeholder="Água necessária por unidade (L)">
            <input type="number" id="fertilizante" placeholder="Fertilizante por unidade (kg)">
            <button id="btn-adicionar">Adicionar Planta</button>

            <div id="resultado"></div>
        </section>

        <section class="section" id="dashboard">
            <h2>Dashboard de Sustentabilidade</h2>
            <div class="card">
                <h3>Água Total</h3>
                <p id="agua-total">0 L</p>
            </div>
            <div class="card">
                <h3>Fertilizante Total</h3>
                <p id="fertilizante-total">0 kg</p>
            </div>
            <div class="card">
                <h3>Alertas</h3>
                <p id="alertas">Nenhum alerta</p>
            </div>
        </section>

        <section class="section" id="tabela-plantas">
            <h2>Resumo das Plantas</h2>
            <table>
                <thead>
                    <tr>
                        <th>Planta</th>
                        <th>Quantidade</th>
                        <th>Água (L)</th>
                        <th>Fertilizante (kg)</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela">
                    <!-- Linhas adicionadas via JS -->
                </tbody>
            </table>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
